<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 11.1 - Profile Card</title>

  <!-- Link Bootstrap 5 CSS via CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body class="bg-light">

  <div class="container my-5">
    <div class="row justify-content-center">
      <div class="col-sm-8 col-md-6 col-lg-4">

        <!-- Profile Card -->
        <div class="card shadow-sm">

          <!-- Profile Card Image Placeholder (using simple inline SVG to avoid broken URL links) -->
          <svg class="bd-placeholder-img card-img-top bg-secondary" width="100%" height="200"
            xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Placeholder: Profile Picture"
            preserveAspectRatio="xMidYMid slice" focusable="false">
            <title>Profile Picture</title>
            <rect width="100%" height="100%" fill="#6c757d"></rect>
            <text x="50%" y="50%" fill="#dee2e6" dy=".3em" text-anchor="middle" font-size="1.5rem"
              font-family="sans-serif">Jane Doe</text>
          </svg>

          <!-- Card Body -->
          <div class="card-body">
            <h5 class="card-title fw-bold">Yuvaraj</h5>
            <h6 class="card-subtitle mb-2 text-muted">Web Developer & UX Designer</h6>
            <p class="card-text">
              Passionate about building responsive, accessible, and user-friendly web interfaces using HTML, CSS, and
              Bootstrap.
            </p>
            <a href="#" class="btn btn-primary">View Portfolio</a>
            <a href="#" class="btn btn-outline-secondary ms-2">Contact</a>
          </div>

        </div>

      </div>
    </div>
  </div>

  <!-- Link Bootstrap 5 JS Bundle via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
</body>

</html>
