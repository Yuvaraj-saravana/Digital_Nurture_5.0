<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 15.1 - Image Border and Rounding Utilities</title>
  
  <!-- Link Bootstrap 5 CSS via CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">

  <div class="container my-5 text-center">
    
    <div class="mb-5">
      <h1 class="fw-bold">Border & Rounding Utilities</h1>
      <p class="lead text-muted">Applying border styles and circular framing to image assets.</p>
    </div>

    <!-- Centered layout block -->
    <div class="card p-4 shadow-sm max-width-md mx-auto" style="max-width: 500px;">
      
      <!-- Styled Avatar Element (Using inline SVG styled with Bootstrap classes) -->
      <!-- We add border, border-primary, border-3, and rounded-circle -->
      <div class="mb-4">
        <svg class="border border-primary border-3 rounded-circle bg-secondary text-white" width="150" height="150" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Profile Avatar">
          <title>Avatar Image Placeholder</title>
          <rect width="100%" height="100%" fill="#6c757d"></rect>
          <text x="50%" y="50%" fill="#ffffff" dy=".3em" text-anchor="middle" font-size="24" font-family="sans-serif">JD</text>
        </svg>
      </div>

      <h5>John Doe Avatar</h5>
      <p class="text-muted small">
        The circular image avatar placeholder above is styled using the following utility classes:
      </p>

      <div class="text-start bg-light p-3 border rounded">
        <code>class="border border-primary border-3 rounded-circle"</code>
      </div>

    </div>

  </div>

  <!-- Link Bootstrap 5 JS Bundle via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
