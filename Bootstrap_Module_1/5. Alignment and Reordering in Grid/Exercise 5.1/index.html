<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 5.1 - Centering Content</title>
  
  <!-- Link Bootstrap 5 CSS via CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">

  <div class="container my-5">
    
    <div class="text-center mb-5">
      <h1 class="fw-bold">Grid Content Centering</h1>
      <p class="lead text-muted">Using <code>justify-content-center</code> and <code>align-items-center</code></p>
    </div>

    <!-- Centered Row Frame -->
    <!-- Note: We add a border and height (e.g. style="min-height: 300px;") to clearly demonstrate vertical alignment -->
    <div class="row border bg-white rounded p-3 align-items-center justify-content-center" style="min-height: 400px;">
      
      <div class="col-md-6 text-center border p-4 bg-light rounded">
        <h3>Centered Content Card</h3>
        <p class="text-muted">
          This block is centered both vertically and horizontally inside the row because of the classes <code>justify-content-center</code> and <code>align-items-center</code>.
        </p>
        <button class="btn btn-primary">Action Button</button>
      </div>

    </div>

  </div>

  <!-- Link Bootstrap 5 JS Bundle via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
