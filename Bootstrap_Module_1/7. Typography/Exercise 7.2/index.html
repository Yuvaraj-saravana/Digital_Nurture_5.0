<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 7.2 - Text Transformations</title>
  
  <!-- Link Bootstrap 5 CSS via CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">

  <div class="container my-5">
    
    <div class="text-center mb-5">
      <h1 class="fw-bold">Text Transformations</h1>
      <p class="lead text-muted">Using <code>text-uppercase</code>, <code>text-lowercase</code>, and <code>text-capitalize</code> utilities.</p>
    </div>

    <div class="card p-4 shadow-sm max-width-md mx-auto" style="max-width: 600px;">
      
      <!-- Example list of transformations -->
      <div class="mb-3">
        <label class="fw-bold text-secondary">Original Text:</label>
        <p class="border p-2 bg-light">this is A sample STRING for demonstration.</p>
      </div>

      <div class="mb-3">
        <label class="fw-bold text-secondary">Uppercase (<code>.text-uppercase</code>):</label>
        <p class="text-uppercase border p-2 bg-white">this is A sample STRING for demonstration.</p>
      </div>

      <div class="mb-3">
        <label class="fw-bold text-secondary">Lowercase (<code>.text-lowercase</code>):</label>
        <p class="text-lowercase border p-2 bg-white">this is A sample STRING for demonstration.</p>
      </div>

      <div class="mb-0">
        <label class="fw-bold text-secondary">Capitalize (<code>.text-capitalize</code>):</label>
        <p class="text-capitalize border p-2 bg-white">this is A sample STRING for demonstration.</p>
      </div>

    </div>

  </div>

  <!-- Link Bootstrap 5 JS Bundle via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
