<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 9.1 - Button Contextual Classes</title>
  
  <!-- Link Bootstrap 5 CSS via CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">

  <div class="container my-5">
    
    <div class="text-center mb-5">
      <h1 class="fw-bold">Bootstrap Buttons</h1>
      <p class="lead text-muted">Demonstration of contextual button classes and outline variants.</p>
    </div>

    <!-- Main Card container -->
    <div class="card p-4 shadow-sm mb-4">
      
      <!-- Standard Contextual Buttons -->
      <div class="mb-4">
        <h2 class="h5 border-bottom pb-2 mb-3">1. Standard Contextual Colors</h2>
        <div class="d-flex flex-wrap gap-2">
          <button type="button" class="btn btn-primary">Primary</button>
          <button type="button" class="btn btn-secondary">Secondary</button>
          <button type="button" class="btn btn-success">Success</button>
          <button type="button" class="btn btn-danger">Danger</button>
          <button type="button" class="btn btn-warning">Warning</button>
          <button type="button" class="btn btn-info">Info</button>
          <button type="button" class="btn btn-light">Light</button>
          <button type="button" class="btn btn-dark">Dark</button>
          <button type="button" class="btn btn-link">Link</button>
        </div>
      </div>

      <!-- Outline Buttons -->
      <div class="mb-4">
        <h2 class="h5 border-bottom pb-2 mb-3">2. Outline Button Classes</h2>
        <div class="d-flex flex-wrap gap-2">
          <button type="button" class="btn btn-outline-primary">Primary</button>
          <button type="button" class="btn btn-outline-secondary">Secondary</button>
          <button type="button" class="btn btn-outline-success">Success</button>
          <button type="button" class="btn btn-outline-danger">Danger</button>
          <button type="button" class="btn btn-outline-warning">Warning</button>
          <button type="button" class="btn btn-outline-info">Info</button>
          <button type="button" class="btn btn-outline-dark">Dark</button>
        </div>
      </div>

      <!-- Button Sizes -->
      <div>
        <h2 class="h5 border-bottom pb-2 mb-3">3. Button Sizes</h2>
        <div class="d-flex flex-wrap align-items-center gap-2">
          <button type="button" class="btn btn-primary btn-lg">Large Button</button>
          <button type="button" class="btn btn-primary">Normal Button</button>
          <button type="button" class="btn btn-primary btn-sm">Small Button</button>
        </div>
      </div>

    </div>

  </div>

  <!-- Link Bootstrap 5 JS Bundle via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
