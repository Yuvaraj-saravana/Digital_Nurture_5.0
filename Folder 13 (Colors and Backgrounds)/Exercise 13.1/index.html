<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 13.1 - Dashboard Color Classes</title>
  
  <!-- Link Bootstrap 5 CSS via CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">

  <div class="container my-5">
    
    <div class="text-center mb-5">
      <h1 class="fw-bold">Dashboard Theme Metrics</h1>
      <p class="lead text-muted">A metric dashboard utilizing contextual background classes.</p>
    </div>

    <!-- Grid Row of Metric Cards -->
    <div class="row g-4 text-center">
      
      <!-- Primary Card -->
      <div class="col-sm-6 col-md-3">
        <div class="card bg-primary text-white h-100 shadow-sm border-0">
          <div class="card-body">
            <h6>Active Subscriptions</h6>
            <h2 class="fw-bold mb-2">1,240</h2>
            <p class="card-text small text-white-50">Increased by 15% this week</p>
          </div>
        </div>
      </div>

      <!-- Success Card -->
      <div class="col-sm-6 col-md-3">
        <div class="card bg-success text-white h-100 shadow-sm border-0">
          <div class="card-body">
            <h6>Revenue Generated</h6>
            <h2 class="fw-bold mb-2">$42,390</h2>
            <p class="card-text small text-white-50">Goal target achieved</p>
          </div>
        </div>
      </div>

      <!-- Warning Card -->
      <div class="col-sm-6 col-md-3">
        <div class="card bg-warning text-dark h-100 shadow-sm border-0">
          <div class="card-body">
            <h6>Pending Verifications</h6>
            <h2 class="fw-bold mb-2">18</h2>
            <p class="card-text small text-black-50">Requires urgent review</p>
          </div>
        </div>
      </div>

      <!-- Danger Card -->
      <div class="col-sm-6 col-md-3">
        <div class="card bg-danger text-white h-100 shadow-sm border-0">
          <div class="card-body">
            <h6>Failed Transactions</h6>
            <h2 class="fw-bold mb-2">3</h2>
            <p class="card-text small text-white-50">Retry attempt ongoing</p>
          </div>
        </div>
      </div>

    </div>

  </div>

  <!-- Link Bootstrap 5 JS Bundle via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
