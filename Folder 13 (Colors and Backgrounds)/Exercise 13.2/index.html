<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 13.2 - Gradient Dark Background</title>
  
  <!-- Link Bootstrap 5 CSS via CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">

  <div class="container my-5">
    
    <!-- Hero Banner with dark gradient -->
    <div class="p-5 text-white bg-dark bg-gradient rounded-3 shadow-lg">
      <div class="container-fluid py-4">
        
        <span class="badge bg-secondary mb-3">Exercise 13.2</span>
        <h1 class="display-5 fw-bold">Dark Gradient Banner</h1>
        <p class="col-md-10 fs-4 text-white-50">
          This box uses the Bootstrap classes <code>bg-dark bg-gradient</code> combined with white text. The gradient adds a subtle linear shift from top to bottom, softening the stark dark background.
        </p>
        
        <button class="btn btn-light btn-lg mt-3" type="button">Explore Products</button>
      </div>
    </div>

  </div>

  <!-- Link Bootstrap 5 JS Bundle via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
